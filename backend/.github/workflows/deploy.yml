name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Deploy to Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/pawnshop/backend
            docker compose pull
            docker compose up -d
            docker exec backend-api-1 npx prisma migrate deploy
            echo "Deployment successful!"

      - name: Notify Slack (Placeholder)
        if: always()
        run: |
          echo "Sending Slack notification..."
          # curl -X POST -H 'Content-type: application/json' --data '{"text":"Deployment status: ${{ job.status }}"}' ${{ secrets.SLACK_WEBHOOK_URL }}
