name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pawnshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Type Check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run Prisma Migrations
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/pawnshop_test

      - name: Run Unit Tests
        working-directory: backend
        run: npm run test tests/unit

      - name: Run Integration Tests
        working-directory: backend
        run: npm run test tests/integration
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/pawnshop_test
          REDIS_URL: redis://localhost:6379

      - name: Build Test
        working-directory: backend
        run: npm run build

      - name: Docker Build Test
        run: docker build -t pawnshop-backend:test -f backend/docker/Dockerfile .
